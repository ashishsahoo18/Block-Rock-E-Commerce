<!DOCTYPE html>

<html>

<head>

<title>Products</title>

</head>


<body>


<h1>Block Rock Products</h1>


<form>

<input 
type="text"
name="search"
placeholder="Search product">


<button>

Search

</button>


</form>



<hr>



{% for product in products %}


<h2>

<a href="/products/{{product.id}}/">

{{product.name}}

</a>

</h2>


<img src="{{product.image.url}}" width="150">


<p>

Price: ₹{{product.price}}

</p>


<p>

Rating: {{product.rating}}

</p>


<hr>


{% endfor %}



</body>

</html>
